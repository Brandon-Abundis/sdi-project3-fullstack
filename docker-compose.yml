services:
  db:
    image: postgres
    container_name: pg-docker
    environment:
      # - DATABASE_HOST=127.0.0.1
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=docker
      - POSTGRES_DB=countries
    ports:
      - 5432:5432
    volumes:
      - /tmp/pgdata:/var/lib/postgresql/

  api:
    build: ./api
    ports:
      - 8080:8080
    volumes:
      - ./api:/app
      - /app/node_modules
    environment:
      # FIX: This tells Knex to connect to the 'db' container, not localhost
      - DATABASE_URL=postgres://postgres:docker@db:5432/countries
    depends_on:
      - db

  ui:
    build: ./ui
    ports:
      - 5173:5173
    volumes:
      - ./ui:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080
    command: npm run dev
    depends_on:
      - api
